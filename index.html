<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&family=Open+Sans:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="profile-card">
        <header class="profile-card__header">
          <h1 class="profile-card__title">Profile</h1>
          <nav class="tabs" aria-label="Profile sections">
            <button class="tabs__item tabs__item--active" type="button">
              Account
            </button>
            <button class="tabs__item" type="button">Preferences</button>
            <button class="tabs__item" type="button">Notifications</button>
            <button class="tabs__item" type="button">Group Memberships</button>
          </nav>
        </header>

        <section class="profile-panel" aria-label="Account settings">
          <div class="profile-panel__avatar">
            <div class="avatar-lg">
              <img
                src="https://via.placeholder.com/96x96.png?text=User"
                alt="Profile avatar"
              />
              <button class="avatar-lg__edit" type="button" aria-label="Change profile image">
                ✎
              </button>
            </div>
          </div>

          <form class="profile-form" id="profile-form">
            <!-- 1. inline 編輯 Display name, email -->
            <div class="form-row">
              <label class="form-row__label" for="displayName">Display Name*</label>
              <input
                class="form-row__input"
                id="displayName"
                name="displayName"
                type="text"
                autocomplete="name"
                value="Shizuku"
              />
            </div>

            <div class="form-row">
              <label class="form-row__label" for="email">Email*</label>
              <input
                class="form-row__input"
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                value="shizuku_ito@example.com"
              />
            </div>

            <!-- 2. Modal 變更密碼 -->
            <div class="form-row">
              <label class="form-row__label" for="password-dummy">Password</label>
              <div class="form-row__field-group">
                <input
                  class="form-row__input form-row__input--readonly"
                  id="password-dummy"
                  type="password"
                  value="••••••••"
                  readonly
                  aria-readonly="true"
                />
                <button class="btn btn--ghost" type="button" id="btn-change-password">
                  Change Password
                </button>
              </div>
            </div>

            <!-- 3. click 可複製 user ID -->
            <div class="form-row">
              <label class="form-row__label" for="userId">User ID</label>
              <div class="form-row__field-group">
                <input
                  class="form-row__input form-row__input--link"
                  id="userId"
                  type="text"
                  value="c8ea9cab-966f-4968-bdf7-b31b83d8ff10"
                  readonly
                />
                <button class="btn btn--ghost" type="button" id="btn-copy-user-id">
                  Copy
                </button>
              </div>
              <p class="helper helper--success" id="user-id-feedback" aria-live="polite"></p>
            </div>

            <!-- 4. 性別、生日、介面語系、時區用 browser default dropdown -->
            <div class="form-row">
              <label class="form-row__label" for="gender">Gender*</label>
              <select class="form-row__select" id="gender" name="gender">
                <option value="">Select</option>
                <option value="female" selected>Female</option>
                <option value="male">Male</option>
                <option value="other">Other</option>
                <option value="prefer-not">Prefer not to say</option>
              </select>
            </div>

            <div class="form-row">
              <label class="form-row__label" for="birthday">Birthday</label>
              <input
                class="form-row__input"
                id="birthday"
                name="birthday"
                type="date"
                placeholder="yyyy/mm/dd"
              />
            </div>

            <div class="form-row">
              <label class="form-row__label" for="language">Display Language</label>
              <select class="form-row__select" id="language" name="language">
                <option value="en" selected>English</option>
                <option value="ja">日本語</option>
                <option value="zh-TW">繁體中文</option>
              </select>
            </div>

            <div class="form-row">
              <label class="form-row__label" for="timezone">Timezone</label>
              <select class="form-row__select" id="timezone" name="timezone">
                <option value="Asia/Tokyo" selected>
                  (GMT +9:00) Asia/Tokyo
                </option>
                <option value="Asia/Taipei">(GMT +8:00) Asia/Taipei</option>
                <option value="America/Los_Angeles">
                  (GMT -8:00) America/Los Angeles
                </option>
                <option value="Europe/London">(GMT +0:00) Europe/London</option>
              </select>
            </div>

            <!-- 5. 變更以上個人資料後可按按鈕儲存 -->
            <div class="form-actions">
              <p class="helper" id="save-feedback" aria-live="polite"></p>
              <button class="btn btn--primary" type="submit" id="btn-save" disabled>
                Save Changes
              </button>
            </div>
          </form>
        </section>
      </section>

      <!-- 密碼變更 Modal -->
      <div class="modal" id="password-modal" aria-hidden="true" role="dialog" aria-modal="true">
        <div class="modal__backdrop"></div>
        <div class="modal__dialog" role="document">
          <header class="modal__header">
            <h2 class="modal__title">Change Password</h2>
          </header>
          <form class="modal__body" id="password-form">
            <div class="form-row form-row--compact">
              <label class="form-row__label" for="currentPassword">Current Password</label>
              <input
                class="form-row__input"
                id="currentPassword"
                type="password"
                autocomplete="current-password"
                required
              />
            </div>
            <div class="form-row form-row--compact">
              <label class="form-row__label" for="newPassword">New Password</label>
              <input
                class="form-row__input"
                id="newPassword"
                type="password"
                autocomplete="new-password"
                required
              />
            </div>
            <div class="form-row form-row--compact">
              <label class="form-row__label" for="confirmPassword">Confirm New Password</label>
              <input
                class="form-row__input"
                id="confirmPassword"
                type="password"
                autocomplete="new-password"
                required
              />
              <p class="helper helper--error" id="password-feedback" aria-live="polite"></p>
            </div>

            <footer class="modal__footer">
              <button class="btn btn--ghost" type="button" id="btn-cancel-password">
                Cancel
              </button>
              <button class="btn btn--primary" type="submit">Save Password</button>
            </footer>
          </form>
        </div>
      </div>
      <script src="./app.js"></script>
    </main>
  </body>
</html>
